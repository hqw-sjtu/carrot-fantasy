name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pytest
    
    - name: Syntax Check
      run: |
        python -m py_compile src/main.py
        python -m py_compile src/towers.py
        python -m py_compile src/monsters.py
        python -m py_compile src/projectiles.py
        python -m py_compile src/particle_system.py
        python -m py_compile src/waves.py
    
    - name: Import Test
      run: |
        python -c "
import sys
sys.path.insert(0, 'src')
from towers import Tower
from monsters import Monster
from projectiles import Projectile
from particle_system import Particle, ParticleSystem
from waves import WaveManager
print('All imports successful')
"

    - name: Unit Tests (pytest)
      run: |
        python -m pytest tests/ -v || python tests/simple_runner.py || echo "All test methods exhausted"