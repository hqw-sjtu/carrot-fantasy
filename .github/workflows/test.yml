name: Python Tests

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pytest
    
    - name: Syntax Check
      run: |
        echo "=== 语法检查 ==="
        python -m py_compile src/main.py
        echo "✓ main.py 语法通过"
        for f in src/*.py; do 
            python -m py_compile "$f" && echo "✓ $f 语法通过"
        done
    
    - name: Import Test
      run: |
        echo "=== 导入测试 ==="
        python -c "import sys; sys.path.insert(0, 'src'); from main import *; print('✓ 导入测试通过')"
    
    - name: Unit Tests
      run: |
        echo "=== 单元测试 ==="
        python -c "
import sys
sys.path.insert(0, 'src')

# 测试渐变缓存
print('测试渐变缓存...')
from main import get_cached_gradient, clear_gradient_cache
surf1 = get_cached_gradient((100, 100), (255, 0, 0), (0, 0, 255), 'horizontal')
surf2 = get_cached_gradient((100, 100), (255, 0, 0), (0, 0, 255), 'horizontal')
assert surf1 is surf2, '缓存应该返回同一对象'
clear_gradient_cache()
print('✓ 渐变缓存测试通过')

# 测试配置加载
print('测试配置加载...')
from config_loader import load_config
cfg = load_config()
assert 'colors' in cfg, '配置应包含colors'
print('✓ 配置加载测试通过')

# 测试状态机
print('测试状态机...')
from state_machine import GameState
state = GameState()
assert state.current_state == 'menu', '初始状态应为menu'
state.change_state('playing')
assert state.current_state == 'playing', '状态应变为playing'
print('✓ 状态机测试通过')

# 测试弹道轨迹系统
print('测试弹道轨迹系统...')
from projectiles import Projectile
from monsters import Monster
monster = Monster(100, 100, 10, 1.0)
proj = Projectile(0, 0, monster, 10, speed=5, tower_type='箭塔')
# 模拟移动更新
proj.x, proj.y = 10, 10
proj.update(1.0)
proj.x, proj.y = 20, 20
proj.update(1.0)
proj.x, proj.y = 30, 30
proj.update(1.0)
assert len(proj.trail_positions) >= 2, '应该有轨迹记录'
print('✓ 弹道轨迹测试通过')

print('\\n=== 所有测试通过! ===')
"