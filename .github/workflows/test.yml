name: Python Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pygame pytest
    
    - name: Syntax Check
      run: |
        python -m py_compile src/main.py
        for f in src/*.py; do python -m py_compile "$f" || exit 1; done
    
    - name: Run Tests
      run: |
        # 导入测试
        python -c "import sys; sys.path.insert(0, 'src'); from main import *; print('✓ 导入测试通过')"